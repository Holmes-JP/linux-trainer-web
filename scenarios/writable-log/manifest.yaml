id: writable-log
verify_fix: "chown user:user /var/log/webapp/app.log"  # 模範修復 (テスト専用・UI 非表示)
title: "ログに書き込めないアプリ"
difficulty: medium
category: permissions
time_estimate_min: 10

description: |
  Web アプリ (user 権限で動作) がログ /var/log/webapp/app.log に書き込めず
  エラーになっている。ログファイルが root 所有で、user が追記できないのが原因。
  user がこのログに追記できるように修復せよ。

# 冪等: 毎回 root 所有・644 (user は書けない) に戻す。
setup:
  - description: "ログファイルを root 所有で作り、user が書けない状態にする"
    cmd: |
      mkdir -p /var/log/webapp
      : > /var/log/webapp/app.log
      chown 0:0 /var/log/webapp/app.log
      chmod 644 /var/log/webapp/app.log

check:
  - description: "user が app.log に追記できる"
    test: "echo test-line >> /var/log/webapp/app.log"
    expect_exit: 0
    run_as: user

hints:
  - "所有者と権限を確認: ls -l /var/log/webapp/app.log (root 所有・その他は書き込み不可)"
  - "アプリは user 権限で動く。所有者を user にするか、書き込み権を与える必要がある"
  - "root (su root、パスワード: password) で: chown user:user /var/log/webapp/app.log (または chmod 666)"

solution: |
  `ls -l /var/log/webapp/app.log` を見ると root 所有・644 で、その他ユーザー (user) は
  書き込めない。`su root` (パスワード: password) で root になり
  `chown user:user /var/log/webapp/app.log` (または `chmod 666`) とすれば user が追記できる。
