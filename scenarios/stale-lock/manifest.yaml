id: stale-lock
verify_fix: "rm -f /run/worker.lock && /etc/init.d/worker start && sleep 1"  # 模範修復 (テスト専用・UI 非表示)
title: "ロックファイルで起動しないワーカー"
difficulty: medium
category: services
time_estimate_min: 15

description: |
  バックグラウンドワーカー worker が停止していて、再起動しようとしても立ち上がらない。
  init スクリプト (/etc/init.d/worker) が「ロックファイルがある」と言って起動を拒否する。
  前回の異常終了で残った古いロックが原因らしい。調査し、worker を起動せよ。
  (この環境に systemd は無い。service コマンドか /etc/init.d を使うこと)

# 冪等: 本体と init を毎回設置し、古いロックを残してワーカーを停止した状態にする。
# 注意: プロセス検出は pgrep -x workerd。本体(workerd)と init(worker)は名前を分ける。
#       常駐は setsid で detach (nohup & は CheerpX で即死する)。
setup:
  - description: "worker を設置し、古いロックを残して停止状態にする"
    cmd: |
      cat > /usr/local/sbin/workerd <<'EOF'
      #!/bin/sh
      while true; do sleep 3; done
      EOF
      chmod 755 /usr/local/sbin/workerd
      cat > /etc/init.d/worker <<'EOF'
      #!/bin/sh
      BIN=/usr/local/sbin/workerd
      LOCK=/run/worker.lock
      case "$1" in
        start)
          if [ -f "$LOCK" ]; then
            echo "worker: stale lock $LOCK present; refusing to start" >&2
            exit 1
          fi
          setsid "$BIN" </dev/null >/dev/null 2>&1 &
          echo "worker started"
          ;;
        stop) pkill -x workerd && echo "worker stopped" ;;
        status) pgrep -x workerd >/dev/null && echo "running" || { echo "stopped"; exit 3; } ;;
        *) echo "usage: $0 {start|stop|status}"; exit 2 ;;
      esac
      EOF
      chmod 755 /etc/init.d/worker
      # 壊す: ワーカーを止め、古いロックを残す
      pkill -x workerd 2>/dev/null || true
      mkdir -p /run
      : > /run/worker.lock

check:
  - description: "worker プロセスが常駐している"
    test: "pgrep -x workerd"
    expect_exit: 0
  - description: "古いロックファイルが残っていない"
    test: "[ ! -f /run/worker.lock ]"
    expect_exit: 0

hints:
  - "まず状態と原因を確認: service worker status、service worker start (root で。エラーメッセージを読む)"
  - "エラーは /run/worker.lock という古いロックが残っていること。worker 自身は動いていない (pgrep -x workerd)"
  - "root (su root、パスワード: password) で古いロックを消して起動: rm /run/worker.lock && service worker start"

solution: |
  `su root` (パスワード: password) で root になり `service worker start` を実行すると
  「stale lock /run/worker.lock present」と出る。ワーカーは動いていない (前回の異常終了で
  ロックだけ残った) ので、`rm /run/worker.lock` で古いロックを削除してから
  `service worker start` で起動すれば常駐する。
