id: wrong-json-value
verify_fix: "sed -i 's/: 80,/: 8080,/' /etc/svc/config.json"  # 模範修復 (テスト専用・UI 非表示)
title: "設定値が間違っている"
difficulty: medium
category: services
time_estimate_min: 10

description: |
  サービス svc が想定と違うポートで待ち受けてしまう。設定ファイル /etc/svc/config.json の port が 80 になっているが、正しくは 8080 だ。
  port だけを 8080 に修正せよ。JSON として妥当なまま保ち、他のキー (service / workers) は変更しないこと。

# 冪等: 毎回 port=80 の妥当な JSON で作り直す。
setup:
  - description: "port が誤った (80) 設定ファイルを設置する"
    cmd: |
      mkdir -p /etc/svc
      cat > /etc/svc/config.json <<'EOF'
      {
        "service": "svc",
        "port": 80,
        "workers": 4
      }
      EOF

check:
  - description: "port が 8080 になっている"
    test: "grep -q 'port.*8080' /etc/svc/config.json"
    expect_exit: 0
  - description: "config.json は妥当な JSON のまま"
    test: "python3 -m json.tool /etc/svc/config.json > /dev/null"
    expect_exit: 0
  - description: "他のキー (service / workers) が失われていない"
    test: "grep -q '\"service\"' /etc/svc/config.json && grep -q '\"workers\"' /etc/svc/config.json"
    expect_exit: 0

hints:
  - "現在の値を確認: cat /etc/svc/config.json (port が 80)"
  - "port の行を 8080 に書き換える。編集後も JSON として妥当であること"
  - "root (su root、パスワード: password) で: sed -i 's/: 80,/: 8080,/' /etc/svc/config.json (または vim で編集)"

solution: |
  port の値が 80 になっている。`su root` (パスワード: password) で root になり、`sed -i 's/: 80,/: 8080,/' /etc/svc/config.json` で 8080 に直せば完了 (vim 等で "port": 8080 に書き換えてもよい)。
