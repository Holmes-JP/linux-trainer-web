name: env
summary: 現在の環境変数を一覧表示する (指定した環境でコマンドを実行することもできる)
group: system
synopsis: "env [オプション] [名前=値 ...] [コマンド]"
options:
  - flag: "-i"
    desc: 環境変数を空にした状態でコマンドを実行する
  - flag: "-u 名前"
    desc: 指定した環境変数を外した状態でコマンドを実行する
examples:
  - cmd: env
    desc: 今のシェルに設定されている環境変数をすべて確認する
  - cmd: env | grep APP
    desc: アプリが参照する変数 (APP_ENV など) が正しく設定されているか絞り込んで見る
  - cmd: env APP_DEBUG=1 /opt/app/bin/run
    desc: 変数を一時的に上書きした状態でコマンドを試し、挙動の違いを切り分ける
related_commands: [export, echo, grep, source]
related_articles: []
related_scenarios: [env-toggle]
note: >-
  「手で実行すると動くのにサービス経由だと動かない」原因の多くは
  環境変数の違い。env で今の環境を可視化し、サービス側の環境ファイル
  (/etc/app/app.env など) と見比べるのが切り分けの定石。
