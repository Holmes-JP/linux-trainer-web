name: ssh
summary: リモートホストへ暗号化された経路でログイン・コマンド実行する
group: network
synopsis: "ssh [オプション] [ユーザ@]<ホスト> [コマンド]"
options:
  - flag: "-p <ポート>"
    desc: 接続先ポートを指定する (既定は 22)
  - flag: "-i <鍵ファイル>"
    desc: 認証に使う秘密鍵を指定する
  - flag: "-L <ローカル:先ホスト:先ポート>"
    desc: ローカルポート転送 (トンネル) を張る
  - flag: "-N"
    desc: リモートでコマンドを実行せず、転送のみ行う
  - flag: "-v"
    desc: 接続の過程を詳しく表示する (認証の切り分けに有用)
examples:
  - cmd: "ssh user@203.0.113.10"
    desc: ユーザ名を指定してリモートサーバーにログインする
  - cmd: "ssh -i ~/.ssh/id_ed25519 -p 2222 user@example.com"
    desc: 秘密鍵と非標準ポートを指定して接続する
  - cmd: "ssh user@example.com \"df -h\""
    desc: ログインせずに1つのコマンドだけ実行して結果を受け取る
related_commands: [scp, nc, systemctl]
note: >-
  リモートサーバー運用の入口となる最重要コマンド。ただしこのブラウザ内
  WebVM 演習環境はネットワークが制限されており、外部ホストへの接続はできない
  (または不安定な) ことがある。ここでは ssh の書式 (鍵指定やポート指定、
  リモートコマンド実行) を、現実のサーバー作業の参照として覚えてほしい。
