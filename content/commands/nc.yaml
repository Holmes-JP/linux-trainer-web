name: nc
summary: TCP/UDP で任意のポートに接続・待受できる万能ネットワークツール (netcat)
group: network
synopsis: "nc [オプション] <ホスト> <ポート>"
options:
  - flag: "-l"
    desc: 待ち受け (listen) モードで起動する (サーバー側)
  - flag: "-p <ポート>"
    desc: 使用するポート番号を指定する
  - flag: "-v"
    desc: 接続の様子を詳しく表示する (-vv でさらに詳細)
  - flag: "-z"
    desc: データを送らず接続可否だけ調べる (ポートスキャン用)
  - flag: "-w <秒>"
    desc: 接続やアイドルのタイムアウトを指定する
examples:
  - cmd: "nc -zv example.com 443"
    desc: 443 番ポートが開いているかだけを手早く確認する
  - cmd: "nc -zv 192.168.1.10 20-25"
    desc: ポート範囲を指定して開いているポートを調べる
  - cmd: "nc -lvp 4444"
    desc: 4444 番で待ち受け、接続してきた相手とデータをやり取りする
related_commands: [ss, ssh, curl]
note: >-
  ポートの疎通確認や簡易サーバーとして使える便利ツール。ただし
  このブラウザ内 WebVM 演習環境はネットワークが制限されており、外部への
  接続・待受はできない (または不安定な) ことがある。ここでは nc の書式を、
  現実のサーバー作業の参照として覚えてほしい。実務では疎通確認の切り札になる。
