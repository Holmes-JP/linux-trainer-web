name: systemctl
summary: systemd 管理下のサービス (ユニット) を操作・状態確認する
group: services
synopsis: "systemctl <サブコマンド> [ユニット]"
options:
  - flag: "status <ユニット>"
    desc: サービスの状態・直近のログ・プロセス情報をまとめて確認する
  - flag: "start <ユニット>"
    desc: サービスを起動する (stop / restart も同様)
  - flag: "enable <ユニット>"
    desc: ブート時に自動起動するよう登録する (disable で解除)
  - flag: "list-units --type=service"
    desc: 稼働中のサービス一覧を表示する
examples:
  - cmd: systemctl status ssh
    desc: 現代の Linux サーバーで「サービスが動いているか」を確認する定番
  - cmd: systemctl restart nginx
    desc: 設定変更後にサービスを再起動して反映させる
related_commands: [service, journalctl, ps]
related_articles: []
related_scenarios: []
note: >-
  systemd を採用した現代の Linux では標準のサービス管理コマンド。ただし
  この演習環境は systemd が PID 1 で動いていないため systemctl は使えない。
  代わりに service コマンド (または /etc/init.d/<名前> の直接実行) を使うこと。
  考え方 (status で確認 → 直す → restart) はどちらでも同じ。
