name: ls
summary: ディレクトリの中身 (ファイル一覧) を表示する
group: files
synopsis: "ls [オプション] [パス...]"
options:
  - flag: "-l"
    desc: 詳細表示。パーミッション・所有者・サイズ・更新日時が1行ずつ並ぶ
  - flag: "-a"
    desc: 隠しファイル (`.` で始まる名前) も表示する
  - flag: "-h"
    desc: サイズを読みやすい単位 (K/M/G) で表示する (-l と併用)
  - flag: "-S"
    desc: サイズの大きい順に並べ替える
  - flag: "-t"
    desc: 更新時刻の新しい順に並べ替える
  - flag: "-R"
    desc: サブディレクトリの中身も再帰的に表示する
examples:
  - cmd: ls -la /home/user
    desc: 隠しファイルも含めた詳細一覧。調査の第一歩としてまず打つことが多い
  - cmd: ls -l /etc/nginx/sites-enabled
    desc: シンボリックリンクのリンク先 (-> の右側) も確認できる
  - cmd: ls -lS /var/log
    desc: 大きいファイル順に並べて、ディスクを圧迫している犯人を探す
related_commands: [cat, find, df]
related_articles: [permissions]
