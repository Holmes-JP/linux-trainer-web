name: grep
summary: ファイルや入力から、パターンに一致する行を探し出す
group: text
synopsis: "grep [オプション] パターン [ファイル...]"
options:
  - flag: "-i"
    desc: 大文字小文字を区別しない
  - flag: "-n"
    desc: 一致した行の行番号も表示する
  - flag: "-c"
    desc: 一致した行数だけを数えて表示する
  - flag: "-v"
    desc: 一致「しない」行を表示する (除外)
  - flag: "-r"
    desc: ディレクトリを再帰的に検索する
  - flag: "-E"
    desc: 拡張正規表現 (| や + など) を使う
examples:
  - cmd: grep ERROR /var/log/app.log
    desc: ログからエラー行だけを抜き出す
  - cmd: grep -c "Failed password" /var/log/auth.log
    desc: 攻撃の試行回数を数える
  - cmd: grep -rn listen /etc/nginx/
    desc: 設定ディレクトリ全体からキーワードの場所を探す
related_commands: [cat, find]
note: >-
  「どのファイルに書いてあるか分からない」ときは grep -r、
  「どこにあるファイルか分からない」ときは find。組み合わせると強力。
