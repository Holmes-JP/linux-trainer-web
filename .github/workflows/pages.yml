# トレーナー本体 (静的サイト) を GitHub Pages へ公開するワークフロー。
#
# 注意:
#  - 無料の GitHub Pages は Public リポジトリが必要 (このリポは Public)。
#  - github.io/<repo>/ のサブパス配信のため、build 時に BASE_PATH を渡す
#    (svelte.config.js の kit.paths.base が拾う)。root 配信 (独自ドメイン) に
#    変える場合は BASE_PATH を外すだけでよい。
#  - COOP/COEP は Pages がヘッダを付けられないため serviceWorker.js が注入する
#    (app.html で登録済み)。
#
# fork 由来の deploy.yml (ext2 ディスクイメージのビルド) とは別物。
# main への push で自動デプロイ (手動発火も可)。scenarios/ 追加なども自動で公開される。
name: Deploy Trainer to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          BASE_PATH: /linux-trainer-web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
